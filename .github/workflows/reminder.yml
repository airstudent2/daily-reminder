name: Daily Reminder

on:
  schedule:
    - cron: '30 15 * * *'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SENDER_EMAIL }}
          password: ${{ secrets.APP_PASSWORD }}
          to: ${{ secrets.RECEIVER_EMAIL }}
          from: ${{ secrets.SENDER_EMAIL }}
          subject: ⏰ রাত ৯টার Daily Reminder!
          body: |
            আসসালামু আলাইকুম! 🌙

            রাত ৯টা বাজে — আপনার কাজটি এখনই করুন!

            আল্লাহ তাওফিক দিন। 🤲
